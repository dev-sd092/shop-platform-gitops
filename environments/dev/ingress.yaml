apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: shop-platform-ingress
  namespace: shop-platform
  annotations:
    # 1. Rewrite Target: Strips the path prefix (group 1) and passes the rest (group 2)
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    # 2. Enable Regex: Required for the capture groups below to work
    nginx.ingress.kubernetes.io/use-regex: "true"
spec:
  rules:
    - http:
        paths:
          # AUTH SERVICE
          # Matches "/api/auth" followed by a slash or end-of-line
          - path: /api/auth(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: auth-service
                port:
                  number: 4000

          # PRODUCT SERVICE
          - path: /api/products(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: product-service
                port:
                  number: 5000

          # CART SERVICE
          - path: /api/cart(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: cart-service
                port:
                  number: 6001

          # ORDER SERVICE
          - path: /api/orders(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: order-service
                port:
                  number: 7000

          # FRONTEND (No rewrite needed, serves from root)
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80